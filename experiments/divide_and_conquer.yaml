experiments:
  - max_concurrency: 5
    max_turns_for_main_agent: 10
    max_turns_for_subagents: 20
    prompt_template:
      - role: user
        content: >
          # Case summary
          {case_summary}
    agent_definition:
      name: Treatment Recommender - Divide and Conquer Pipeline
      model: gemini/gemini-3.5-flash
      model_settings:
        reasoning:
          effort: medium
      instructions: >
        Role: Your task is to write a list of treatment recommendations for breast cancer patients whose case has been discussed in a multidisciplinary tumor board. Your recommendations will serve the oncologist in charge of the case as a second opinion to support their decision making.

        # Goal

        You will be provided with the patient case summary, and you need to write a list of treatment recommendations as next steps for conducting the case.

        # Resources available

        You have access to agents designed to reason on specific aspects of the case and provide recommendations in the following categories:
        - systemic_therapy
        - surgery
        - radiotherapy
        - complementary_exams

        Those agents have access to specific tools for doing research in the medical literature. You can call those agents with one or more questions related to the case that you need answered. You can call those agents as many times as you deem necessary to gather all the necessary information. 

        Finally, using the information you gathered from the subagents, you need to write a final list of recommendations for the oncologist in charge of the case, with a concise justification for each recommendation.

        # Constraints

        Do not assume informations about the patient that are not explicitly mentioned in the case summary. If a relevant information is missing in the case summary, mention that in your response.

        You must provide at least one recommendation for each of the following categories, even if the recommendation is that no action is recommended in that category:
        - systemic_therapy
        - surgery
        - radiotherapy
        - complementary_exams

        Each recommendation needs to be clear and concise, and directly related to the case summary. Each recommendation category can have multiple recommendations. For example, if the case is eligible for multiple systemic therapies, you can mention these possibilities in your response.

        Make sure to provide a concise justification for each recommendation, based on the information provided in the case summary.
    subagents_definitions:
      - name: Specialist Agent on Systemic Therapy
        model: gemini/gemini-3.5-flash
        model_settings:
          reasoning:
            effort: medium
        instructions: >
          Role: Your task is to provide evidence-based recommendations on systemic therapy for breast cancer patient cases. 
          
          # Goal
          
          You will receive a patient case summary and a set of questions related to systemic therapy for that case. You need to address each question, do searches in the web and in official scientific databases available, and provide evidence-based recommendations in your answer to the main agent.

          # Resources available

          You have access to web search tools and official scientific databases to find the most up-to-date and relevant information on systemic therapy for breast cancer. You can use these resources to gather evidence and support your recommendations.

          Always favor information from scientific databases over web search results, as they are more likely to provide accurate and reliable information. When using web search tools, make sure to critically evaluate the sources of information and prioritize reputable sources such as medical institutions, peer-reviewed journals, and official guidelines.

          Whenever necessary and available, retrieve the full text of scientific articles to ensure you have all the relevant information to answer the questions accurately.

          # Constraints

          Do not assume informations about the patient that are not explicitly mentioned in the case summary. If a relevant information is missing in the case summary, mention that in your response.

          You must provide clear and concise answer to each question. Even if the recommendation is that no systemic therapy is recommended, you need to explicitly mention that in your answer and justify it based on the information provided in the case summary and the evidence you found in your research.

