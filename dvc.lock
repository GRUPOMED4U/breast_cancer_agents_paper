stages:
  prepare_case_summaries:
    cmd: python prepare_case_summaries.py
    deps:
    - path: data/cases_stage_1.csv
      hash: md5
      md5: e549d773e1deb6377a2e2cc49a4dfea1
      size: 57735
    - path: data/cases_stage_2.csv
      hash: md5
      md5: edd06126e8bd4e331ad605c4dc64d942
      size: 43336
    - path: data/cases_stage_3.csv
      hash: md5
      md5: e6e043d23af41d688e9ffa6b6f2a199e
      size: 43764
    - path: data/cases_stage_4.csv
      hash: md5
      md5: e0070cc0036a92dab7850646bca9822c
      size: 43615
    - path: prepare_case_summaries.py
      hash: md5
      md5: 6ba0da559809d7441226fe88c7e4b889
      size: 2563
    outs:
    - path: data/case_summaries.jsonl
      hash: md5
      md5: 3e432f79c9455184a8eb1285c36752e1
      size: 123413
  generate_rubrics:
    cmd: python generate_rubrics.py
    deps:
    - path: data/case_summaries.jsonl
      hash: md5
      md5: 3e432f79c9455184a8eb1285c36752e1
      size: 123413
    - path: generate_rubrics.py
      hash: md5
      md5: 25455c917623b466123837a6e4a177d6
      size: 6060
    params:
      agent_definitions.yaml:
        rubric_generator:
          name: Rubric Generator
          model: gemini/gemini-3.5-flash
          model_settings:
            reasoning:
              effort: high
          instructions: "Role: Your task is to generate a set of rubrics to evaluate
            the quality of treatment recommendations for breast cancer patients. \n\
            # Goal\nYou will be provided with the treatment decisions made by the
            patient's oncologist. Use them as a reference when generating the rubrics.
            You need to generate a set of rubrics that can be used to evaluate the
            quality of the treatment recommendations provided by a treatment recommender
            system.\n# Resources\nYou will have access to web search, PubMed search
            and be able to fetch full webpages and full PMC articles if needed. You
            must use those resources to generate the final set of rubrics.\n# Constraints\n\
            In some cases, more than one treatment option is available. Make sure
            that these options are reflected in the rubrics you generate. \nMake the
            rubrics as specific and concise as possible. It is preferrable to have
            many concise rubrics than a few long rubrics.\nAssume that the treatment
            recommender that will be evaluated using the rubrics you generate will
            only have access to the case summary. Sometimes, previous treatments received
            by the patient are not explicitly mentioned in the case summary, but they
            are part of the treatment decisions made by the oncologist. In those cases,
            you should include those treatments as part of the rubrics you generate
            and not assume the patient had already received them. Only assume the
            patient has received treatments that are explicitly mentioned in the case
            summary.\nYou must create at least one rubric for each of the following
            categories: - systemic_therapy - surgery - radiotherapy - complementary_exams\n\
            You can add rubrics with negative points if applicable. For example, if
            the system being evaluated includes prescriptions of contraindicated procedures,
            you can create a rubric like \"recommends a contraindicated procedure\"\
            \ with negative points.\nEach rubric category can have multiple rubrics,
            for example, if the official recommendations provide a list of systemic
            therapy options, you can create a rubric for each of those options.\n\
            If action is recommended a specific treatment category, you should create
            a rubric that states that no action is recommended in that category.\n\
            Your response must be in JSON format following the schema provided. \n"
          output_type: RubricList
    outs:
    - path: data/eval_dataset.jsonl
      hash: md5
      md5: 4456766f9883917edda4fd80019bb8b7
      size: 434258
  single_llm_zero_shot@gemini/gemini-3.5-flash:
    cmd: python run_inference.py --model gemini/gemini-3.5-flash --pipeline 
      single_llm_zero_shot --save-steps 10
